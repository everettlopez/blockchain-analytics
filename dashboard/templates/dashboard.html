{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Chain - Dashboard</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard.css' %}">

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>

<body>

    <main>

        <div class="sidebar">
            <ul>
                <li><a>Dashboard</a></li>
            </ul>
        </div>

        <div class="linechart-token_balance-section">
            <div id="price-chart"></div>

            <div class="token-balances-column-section">

                <div class="token-balance-card">

                    <div class="token-balance-card-text">
                        <span>BNB</span>
                        <span>1.725643</span>
                    </div>

                    <button class="token-balance">$0.00</button>
                    <button class="">See More</button>
                </div>
            </div>
        </div>

        

    </main>
    <footer>

    </footer>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="{% static 'js/linechart.js' %}"></script>
